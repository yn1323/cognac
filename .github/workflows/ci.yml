name: CI

on: push

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build（shared → 他パッケージの型解決に必要）
        run: pnpm -r build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint
